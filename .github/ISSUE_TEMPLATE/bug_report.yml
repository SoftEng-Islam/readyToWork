name: Bug report
description: Report a reproducible bug in the starter
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug. Please include enough detail for someone else to reproduce it quickly.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and the behavior you observed.
      placeholder: The checkout page fails after submitting a valid address.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Start the app with `pnpm dev`
        2. Open `/checkout`
        3. Submit the form with valid values
        4. See the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, Node.js version, pnpm version, and browser if relevant.
      placeholder: Ubuntu 24.04, Node 22, pnpm 10.14.0, Chrome 134
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste logs, stack traces, or screenshots if they help explain the issue.
